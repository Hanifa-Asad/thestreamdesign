<svg viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 0 25px rgba(57,255,20,0.5))">
  <!-- Warrior/Streamer Character in Action Pose -->
  <defs>
    <linearGradient id="actionGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#39ff14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00dd00;stop-opacity:0.85" />
    </linearGradient>
  </defs>
  
  <!-- Head - tilted action pose -->
  <circle cx="95" cy="50" r="28" fill="url(#actionGreen)" opacity="0.95"/>
  
  <!-- Hair accent -->
  <path d="M 67 35 Q 70 15 95 10 Q 120 15 123 35" stroke="#39FF14" stroke-width="2.5" fill="none" opacity="0.8"/>
  
  <!-- Eyes with intensity -->
  <circle cx="85" cy="48" r="4" fill="#000"/>
  <circle cx="105" cy="48" r="4" fill="#000"/>
  <circle cx="87" cy="46" r="2" fill="#39FF14" opacity="0.9"/>
  <circle cx="107" cy="46" r="2" fill="#39FF14" opacity="0.9"/>
  
  <!-- Body - Action stance, twisted -->
  <ellipse cx="100" cy="110" rx="42" ry="50" fill="url(#actionGreen)" opacity="0.9"/>
  
  <!-- Center power core glow -->
  <circle cx="100" cy="110" r="15" fill="#39FF14" opacity="0.6"/>
  
  <!-- Raised left arm (reaching/action pose) -->
  <line x1="65" y1="85" x2="25" y2="45" stroke="url(#actionGreen)" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
  <circle cx="25" cy="45" r="10" fill="#39FF14" opacity="0.85"/>
  
  <!-- Right arm down -->
  <line x1="135" y1="90" x2="160" y2="140" stroke="url(#actionGreen)" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
  <circle cx="160" cy="140" r="10" fill="#39FF14" opacity="0.85"/>
  
  <!-- Left leg forward (action stance) -->
  <line x1="80" y1="160" x2="60" y2="240" stroke="url(#actionGreen)" stroke-width="13" stroke-linecap="round" opacity="0.85"/>
  <rect x="52" y="240" width="20" height="22" rx="3" fill="#39FF14" opacity="0.85"/>
  
  <!-- Right leg back -->
  <line x1="120" y1="160" x2="130" y2="260" stroke="url(#actionGreen)" stroke-width="13" stroke-linecap="round" opacity="0.85"/>
  <rect x="122" y="260" width="20" height="22" rx="3" fill="#39FF14" opacity="0.85"/>
  
  <!-- Energy waves around character -->
  <circle cx="100" cy="140" r="65" fill="none" stroke="#39FF14" stroke-width="1.5" opacity="0.4"/>
  <path d="M 30 100 Q 50 70 100 65 Q 150 70 170 100" stroke="#39FF14" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M 25 150 Q 50 160 100 165 Q 150 160 175 150" stroke="#39FF14" stroke-width="1" opacity="0.5" fill="none"/>
</svg>
<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 0 20px rgba(57,255,20,0.6))">
  <!-- Hacker/Esports Player Character -->
  <defs>
    <linearGradient id="sleekGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2cff05;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00aa00;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Head -->
  <circle cx="100" cy="60" r="30" fill="url(#sleekGreen)" opacity="0.9"/>
  
  <!-- Hair/Tech visor -->
  <path d="M 70 45 Q 100 25 130 45" stroke="#39FF14" stroke-width="3" fill="none" opacity="0.8"/>
  
  <!-- Face details -->
  <circle cx="90" cy="60" r="5" fill="#000" opacity="0.9"/>
  <circle cx="110" cy="60" r="5" fill="#000" opacity="0.9"/>
  
  <!-- LED accent on forehead -->
  <circle cx="100" cy="40" r="3" fill="#39FF14" opacity="0.95"/>
  
  <!-- Hooded/tech jacket top -->
  <path d="M 50 90 L 70 100 L 70 150 L 130 150 L 130 100 L 150 90 Q 100 85 50 90" 
        fill="url(#sleekGreen)" opacity="0.85"/>
  
  <!-- Neon striping -->
  <line x1="70" y1="100" x2="70" y2="150" stroke="#39FF14" stroke-width="2" opacity="0.7"/>
  <line x1="130" y1="100" x2="130" y2="150" stroke="#39FF14" stroke-width="2" opacity="0.7"/>
  
  <!-- Arms with gloves -->
  <ellipse cx="40" cy="120" rx="15" ry="35" fill="#00cc00" opacity="0.8"/>
  <ellipse cx="160" cy="120" rx="15" ry="35" fill="#00cc00" opacity="0.8"/>
  
  <!-- Gloved hands with controls -->
  <rect x="28" y="155" width="24" height="25" rx="3" fill="#39FF14" opacity="0.8"/>
  <rect x="148" y="155" width="24" height="25" rx="3" fill="#39FF14" opacity="0.8"/>
  
  <!-- Pants -->
  <rect x="75" y="150" width="15" height="60" fill="#00cc00" opacity="0.85"/>
  <rect x="110" y="150" width="15" height="60" fill="#00cc00" opacity="0.85"/>
  
  <!-- Boots -->
  <rect x="70" y="210" width="25" height="20" rx="3" fill="#39FF14" opacity="0.8"/>
  <rect x="105" y="210" width="25" height="20" rx="3" fill="#39FF14" opacity="0.8"/>
  
  <!-- Glow effect -->
  <circle cx="100" cy="130" r="80" fill="none" stroke="#39FF14" stroke-width="1.5" opacity="0.2"/>
  <path d="M 40 100 Q 60 80 100 75 Q 140 80 160 100" stroke="#39FF14" stroke-width="1" opacity="0.4" fill="none"/>
</svg>